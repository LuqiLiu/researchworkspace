{% extends "base.html" %}
{% block title %}登录 · Research Workspace Lite{% endblock %}
{% block public_content %}
<main class="auth-card">
    <p class="kicker">Member access</p>
    <h1>欢迎回来</h1>
    <p class="muted">登录你的私密科研空间。</p>
    {% if rate_limited %}<p class="message error">失败次数过多，请 15 分钟后再试。</p>{% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">进入工作台</button>
    </form>
    <p class="meta">账号由系统管理员创建，不开放自助注册。</p>
</main>
{% endblock %}
