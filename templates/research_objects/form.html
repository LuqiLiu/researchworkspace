{% extends "base.html" %}
{% block title %}{{ heading }} · Research Workspace Lite{% endblock %}
{% block content %}
<main class="narrow">
    <h1>{{ heading }}</h1>
    <p class="meta">新建内容默认仅你自己可见。正文以 Markdown 保存。</p>
    <form method="post" class="card">
        {% csrf_token %}
        {{ form.as_p }}
        {% if object %}<p id="autosave-status" class="meta" aria-live="polite">等待编辑</p>{% endif %}
        <button type="submit">保存</button>
        {% if object %}<a class="button secondary" href="{% url 'research_objects:detail' object.pk %}">取消</a>{% endif %}
    </form>
</main>
{% endblock %}
